    <polygon points="21,-36.4 23.3,-29.4 29.5,-29.4 24.5,-24.4 26.5,-17.4 21,-21.9 15.5,-17.4 17.5,-24.4 12.5,-29.4 18.7,-29.4" />
    <polygon points="36.4,-21 38.7,-14 44.9,-14 39.9,-9 41.9,-2 36.4,-6.5 30.9,-2 32.9,-9 27.9,-14 34.1,-14" />
    <polygon points="42,0 44.3,7 50.5,7 45.5,12 47.5,19 42,14.5 36.5,19 38.5,12 33.5,7 39.7,7" />
    <polygon points="36.4,21 38.7,28 44.9,28 39.9,33 41.9,40 36.4,35.5 30.9,40 32.9,33 27.9,28 34.1,28" />
