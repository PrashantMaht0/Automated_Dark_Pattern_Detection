    <polygon points="-21,36.4 -18.7,43.4 -12.5,43.4 -17.5,48.4 -15.5,55.4 -21,50.9 -26.5,55.4 -24.5,48.4 -29.5,43.4 -23.3,43.4" />
    <polygon points="-36.4,21 -34.1,28 -27.9,28 -32.9,33 -30.9,40 -36.4,35.5 -41.9,40 -39.9,33 -44.9,28 -38.7,28" />
    <polygon points="-42,0 -39.7,7 -33.5,7 -38.5,12 -36.5,19 -42,14.5 -47.5,19 -45.5,12 -50.5,7 -44.3,7" />
    <polygon points="-36.4,-21 -34.1,-14 -27.9,-14 -32.9,-9 -30.9,-2 -36.4,-6.5 -41.9,-2 -39.9,-9 -44.9,-14 -38.7,-14" />
