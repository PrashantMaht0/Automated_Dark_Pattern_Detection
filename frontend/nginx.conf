# 1. Force HTTP to HTTPS (Mandatory for .dev domains)
server {
    listen 80;
    server_name darkpatterndetector.dev www.darkpatterndetector.dev;
    
    # Redirect all traffic to the secure version
    return 301 https://$host$request_uri;
}

# 2. The Secure HTTPS Server
server {
    listen 443 ssl;
    server_name darkpatterndetector.dev www.darkpatterndetector.dev;

    # The exact paths to the certificates mapped in docker-compose.yml
    # (Double-check that these match the exact filenames you used in your certs folder!)
    ssl_certificate /etc/nginx/ssl/yourdomain.crt;
    ssl_certificate_key /etc/nginx/ssl/mydomain.key;

    # Standard security protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/ {
        proxy_pass http://node-backend:5000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
    }
    # React Router SPA rules (Fixes the 404 on refresh)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Allow access to the saved screenshots
    location /exports/ {
        alias /usr/share/nginx/html/exports/;
    }

    # Error handling
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}