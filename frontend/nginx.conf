# 1. Force HTTP to HTTPS
server {
    listen 80;
    server_name darkpatterndetector.dev www.darkpatterndetector.dev; # Replace with your actual domain
    return 301 https://$host$request_uri;
}

# 2. The Secure HTTPS Server
server {
    listen 443 ssl;
    server_name darkpatterndetector.dev www.darkpatterndetector.dev; # Replace with your actual domain

    # Tell Nginx exactly where Docker mounted the certificates
    ssl_certificate /etc/nginx/ssl/yourdomain.crt;
    ssl_certificate_key /etc/nginx/ssl/mydomain.key;

    # Standard security protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # React Router rules
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Image exports rule
    location /exports/ {
        alias /usr/share/nginx/html/exports/;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}