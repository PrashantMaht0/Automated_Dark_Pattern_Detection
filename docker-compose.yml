services:
  # 1. The React Website (Accessible publicly on port 80)
  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/ssl:ro- 
      - ./exports:/usr/share/nginx/html/exports:ro
    depends_on:
      - node-backend

  # 2. The Node Server
  node-backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./exports:/exports 
    environment:
      - SCRAPER_API_URL=http://scraper-service:8000/api/capture
      - AI_SERVICE_URL=http://ai-service:8001/audit
      - PORT=5000
    depends_on:
      - scraper-service
      - ai-service
      
  # 3. The Selenium Scraper
  scraper-service:
    build: ./scraper-service
    ports:
      - "8000:8000"
    volumes:
      - ./exports:/exports # Consistent internal path
    environment:
      - DISPLAY=:99

  # 4. The Gemini/HuggingFace AI Engine
  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"
    volumes:
      - ./exports:/exports # Consistent internal path
    env_file:
      - ./ai-service/.env