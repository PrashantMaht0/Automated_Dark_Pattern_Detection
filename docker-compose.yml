version: '3.8'

services:
  # 1. The React Website (Accessible publicly on port 80)
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - node-backend

  # 2. The Node Server
  node-backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./exports:/app/exports
    env_file:
      - ./backend/.env
    depends_on:
      - scraper-service
      - ai-service

  # 3. The Selenium Scraper
  scraper-service:
    build: ./scraper
    ports:
      - "8000:8000"
    volumes:
      - ./exports:/app/exports
    environment:
      - DISPLAY=:99

  # 4. The Gemini/HuggingFace AI Engine
  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"
    volumes:
      - ./exports:/app/exports
    env_file:
      - ./ai-service/.env